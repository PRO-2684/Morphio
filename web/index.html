<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Morphio x WASM</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Morphio x WASM</h1>

        <div class="card">
            <div>
                <label for="font-file">Font File</label>
                <input
                    id="font-file"
                    type="file"
                    accept=".ttf,.otf,.ttc,.woff,.woff2,font/*"
                />
            </div>

            <div class="row morph-row">
                <div class="morph-heading">
                    <label>Morph Words</label>
                    <div
                        id="status"
                        class="status"
                        data-state="idle"
                        data-busy="false"
                    >
                        <span class="spinner" aria-hidden="true"></span>
                        <span id="status-text">Loading WebAssembly…</span>
                    </div>
                </div>
                <span class="inline-label">Render</span>
                <input
                    id="from-word"
                    class="word-input"
                    type="text"
                    value="banana"
                    spellcheck="false"
                    autocomplete="off"
                />
                <span class="inline-label">as</span>
                <input
                    id="to-word"
                    class="word-input"
                    type="text"
                    value="orange"
                    spellcheck="false"
                    autocomplete="off"
                />
                <span class="inline-label">!</span>
                <button id="morph-button" disabled>Morph 🪄</button>
            </div>

            <details class="advanced-settings">
                <summary>Advanced settings</summary>
                <div class="advanced-body">
                    <label class="checkbox-row" for="word-match">
                        <input id="word-match" type="checkbox" checked />
                        <span>
                            Enable word match
                            <small
                                >Only morph whole-word matches instead of
                                applying substitutions inside larger words.</small
                            >
                        </span>
                    </label>
                </div>
            </details>

            <div class="output-area">
                <div class="preview-grid">
                    <div class="preview-pane">
                        <label for="source-preview"
                            >Original font preview</label
                        >
                        <textarea id="source-preview" spellcheck="false">
banana.</textarea
                        >
                    </div>
                    <div class="preview-pane">
                        <label for="morphed-preview"
                            >Morphed font preview</label
                        >
                        <textarea
                            id="morphed-preview"
                            spellcheck="false"
                            readonly
                        ></textarea>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="download-button" disabled>
                    Download morphed font
                </button>
                <button id="reset-preview" class="secondary">
                    Reset preview text
                </button>
            </div>
        </div>

        <p class="help">
            Upload a font, choose two words with the same length, then click
            Morph. The morphed font will render the source word as the
            second word. You can preview before downloading the morphed
            font. GitHub: <a href="https://github.com/PRO-2684/morphio" target="_blank">PRO-2684/morphio</a>.
        </p>

        <script type="module" src="./index.js"></script>
    </body>
</html>
