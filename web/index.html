<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Morphio x WASM</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <link rel="manifest" href="manifest.json" />
    </head>
    <body>
        <h1>Morphio x WASM</h1>

        <div class="card">
            <div>
                <label for="font-file">Font File</label>
                <input
                    id="font-file"
                    type="file"
                    accept=".ttf,.otf,.ttc,.woff,.woff2,font/*"
                />
            </div>

            <div class="row morph-row">
                <div class="morph-heading">
                    <label>Morph Rules</label>
                    <div
                        id="status"
                        class="status"
                        data-state="idle"
                        data-busy="false"
                    >
                        <span class="spinner" aria-hidden="true"></span>
                        <span id="status-text">Loading WebAssembly…</span>
                    </div>
                </div>
                <div id="rule-list" class="rule-list">
                    <div class="rule-row">
                        <span class="inline-label">Render</span>
                        <input
                            class="word-input"
                            data-role="from"
                            type="text"
                            value="banana"
                            spellcheck="false"
                            autocomplete="off"
                        />
                        <span class="inline-label">as</span>
                        <input
                            class="word-input"
                            data-role="to"
                            type="text"
                            value="orange"
                            spellcheck="false"
                            autocomplete="off"
                        />
                        <button
                            id="add-rule-button"
                            class="secondary rule-action-button"
                            type="button"
                        >
                            +
                        </button>
                    </div>
                </div>
            </div>

            <details class="advanced-settings">
                <summary>⚙️ Advanced settings</summary>
                <div class="advanced-body">
                    <label class="checkbox-row" for="word-match-start">
                        <input id="word-match-start" type="checkbox" checked />
                        <span>
                            Match word start
                            <small
                                >Require a word boundary before the source
                                word.</small
                            >
                        </span>
                    </label>
                    <label class="checkbox-row" for="word-match-end">
                        <input id="word-match-end" type="checkbox" checked />
                        <span>
                            Match word end
                            <small
                                >Require a word boundary after the source
                                word.</small
                            >
                        </span>
                    </label>
                    <label class="checkbox-row" for="skip-missing-glyphs">
                        <input id="skip-missing-glyphs" type="checkbox" />
                        <span>
                            Skip missing glyphs
                            <small
                                >Ignore rules that reference characters not
                                present in the uploaded font.</small
                            >
                        </span>
                    </label>
                </div>
            </details>

            <div class="actions controls-actions">
                <button id="morph-button" disabled>🪄 Morph</button>
                <button id="download-button" disabled>
                    📥 Download morphed font
                </button>
                <input
                    id="recipe-file"
                    type="file"
                    accept=".toml,text/plain"
                    hidden
                />
                <button
                    id="import-recipe-button"
                    class="secondary"
                    type="button"
                >
                    Recipe import
                </button>
                <button
                    id="export-recipe-button"
                    class="secondary"
                    type="button"
                >
                    Recipe export
                </button>
            </div>

            <div class="output-area">
                <div class="preview-grid">
                    <div class="preview-pane">
                        <label for="source-preview"
                            >Original font preview</label
                        >
                        <textarea id="source-preview" spellcheck="false">
banana.</textarea
                        >
                    </div>
                    <div class="preview-pane">
                        <label for="morphed-preview"
                            >Morphed font preview</label
                        >
                        <textarea
                            id="morphed-preview"
                            spellcheck="false"
                            readonly
                        ></textarea>
                    </div>
                </div>
            </div>
        </div>

        <p class="help">
            Upload a font, add one or more morph rules, then click Morph. The
            morphed font will render each source word as its target word. You
            can preview before downloading the morphed font. GitHub:
            <a href="https://github.com/PRO-2684/Morphio" target="_blank"
                >PRO-2684/Morphio</a
            >.
        </p>

        <script type="module" src="./index.js"></script>
        <template id="morph-rule-template">
            <div class="rule-row">
                <span class="inline-label">Render</span>
                <input
                    class="word-input"
                    data-role="from"
                    type="text"
                    spellcheck="false"
                    autocomplete="off"
                />
                <span class="inline-label">as</span>
                <input
                    class="word-input"
                    data-role="to"
                    type="text"
                    spellcheck="false"
                    autocomplete="off"
                />
                <button
                    class="secondary rule-action-button remove-rule-button"
                    type="button"
                >
                    -
                </button>
            </div>
        </template>
    </body>
</html>
