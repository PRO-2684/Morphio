<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Morphio x WASM</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Morphio x WASM</h1>

        <div class="card">
            <div>
                <label for="font-file">Font File</label>
                <input
                    id="font-file"
                    type="file"
                    accept=".ttf,.otf,.ttc,.woff,.woff2,font/*"
                />
            </div>

            <div class="row morph-row">
                <span class="inline-label">Render</span>
                <input
                    id="from-word"
                    class="word-input"
                    type="text"
                    value="banana"
                    spellcheck="false"
                    autocomplete="off"
                />
                <span class="inline-label">as</span>
                <input
                    id="to-word"
                    class="word-input"
                    type="text"
                    value="orange"
                    spellcheck="false"
                    autocomplete="off"
                />
                <span class="inline-label">!</span>
                <button id="morph-button" disabled>Morph</button>
            </div>

            <div id="status" class="status" data-state="idle" data-busy="false">
                <span class="spinner" aria-hidden="true"></span>
                <span id="status-text">Loading WebAssembly…</span>
            </div>

            <div class="output-area">
                <label for="preview">Preview</label>
                <textarea id="preview" spellcheck="false" rows="10">
banana
bandana
bananarama

Try typing the source word in different contexts here.</textarea
                >
            </div>

            <div class="actions">
                <button id="download-button" disabled>Download morphed font</button>
                <button id="reset-preview" class="secondary">Reset preview text</button>
            </div>
        </div>

        <p class="help">
            Upload a font, choose two words with the same length, then click
            Morph. The preview will use the rebuilt font directly in your
            browser.
        </p>
        <p class="help">
            Source:
            <a href="https://github.com/PRO-2684/morphio" target="_blank" rel="noreferrer"
                >github.com/PRO-2684/morphio</a
            >
        </p>

        <script type="module" src="./index.js"></script>
    </body>
</html>
